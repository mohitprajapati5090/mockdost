<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOCKDOST - AI Test Series</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f3ff;
    }

    /* Navbar */
    .nav {
      background: #6d28d9;
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .btn {
      background: white;
      color: #6d28d9;
      padding: 8px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
      color: #111;
    }

    .hero p {
      color: #555;
      font-size: 18px;
    }

    .cta {
      margin-top: 20px;
      background: #6d28d9;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Cards */
    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Footer */
    .footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>

</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">MOCKDOST</div>
    <button class="btn">Login</button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Learn • Practice • Crack It</h1>
    <p>AI Powered Test Series Platform for SSC, Banking, UPSC, JEE, NEET</p>
    <button class="cta">Start Free Test</button>
  </div>

  <!-- FEATURES -->
  <div class="section">
    <h2>Why MOCKDOST?</h2>

    <div class="cards">
      <div class="card">AI Test Series</div>
      <div class="card">Timer Based Exams</div>
      <div class="card">Negative Marking</div>
      <div class="card">Leaderboard</div>
    </div>
  </div>

  <!-- EXAMS -->
  <div class="section">
    <h2>All Exams</h2>

    <div class="cards">
      <div class="card">SSC</div>
      <div class="card">Banking</div>
      <div class="card">UPSC</div>
      <div class="card">JEE</div>
      <div class="card">NEET</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 MOCKDOST | Learn • Practice • Crack It
  </div>

</body>
</html>
